name: Scrape Semiconductor Jobs
on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run job scraper
        run: python scraper/job_scraper.py
        env:
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DB_PATH: data/semijobs.db

      - name: Commit updated database
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/semijobs.db
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update jobs database [$(date -u +'%Y-%m-%d %H:%M')]"
            git push
          fi
